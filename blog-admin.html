<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Admin — Masud</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-dark:#0B1220;
    --bg-light:#F7F8FA;
    --surface:#FFFFFF;
    --border:#E6E9EF;
    --text-primary:#0F172A;
    --text-muted:#5B6472;
    --text-inverse:#F8FAFC;
    --accent:#2F6FED;
    --accent-2:#16A34A;
    --danger:#DC2626;
    --radius:12px;
    --font-display:'Sora',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg-light);color:var(--text-primary);font-family:var(--font-body);}
  a{color:inherit;}

  /* ---- Login ---- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg-dark);
  }
  .login-card{
    background:var(--surface);
    padding:40px;border-radius:var(--radius);
    width:100%;max-width:360px;
  }
  .login-card h1{font-family:var(--font-display);font-size:22px;margin:0 0 6px;}
  .login-card p{color:var(--text-muted);font-size:14px;margin:0 0 24px;}
  input{
    width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;
    font-family:var(--font-body);font-size:14px;margin-bottom:12px;
  }
  button{
    font-family:var(--font-body);font-weight:600;font-size:14px;
    border:none;border-radius:8px;padding:12px 18px;cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:#fff;width:100%;}
  .btn-primary:hover{background:#255FD6;}
  .error-text{color:var(--danger);font-size:13px;margin-top:8px;display:none;}

  /* ---- Dashboard ---- */
  #dashboard{display:none;}
  .topbar{
    background:var(--bg-dark);color:var(--text-inverse);
    padding:18px 28px;display:flex;justify-content:space-between;align-items:center;
  }
  .topbar h1{font-family:var(--font-display);font-size:17px;margin:0;}
  .logout-btn{background:transparent;color:#93C5FD;font-family:var(--font-mono);font-size:12.5px;border:1px solid rgba(147,197,253,0.3);}

  .layout{max-width:960px;margin:0 auto;padding:32px 24px 80px;display:grid;gap:32px;}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
  .panel h2{font-family:var(--font-display);font-size:16px;margin:0 0 18px;}

  label{display:block;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
  .field{margin-bottom:16px;}
  textarea{
    width:100%;min-height:220px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;
    font-family:var(--font-mono);font-size:14px;line-height:1.6;resize:vertical;
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .publish-row{display:flex;align-items:center;gap:10px;margin:6px 0 18px;}
  .publish-row input{width:auto;margin:0;}
  .btn-row{display:flex;gap:10px;}
  .btn-secondary{background:#EEF1F6;color:var(--text-primary);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(220,38,38,0.3);}

  .post-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;border-bottom:1px solid var(--border);
  }
  .post-item:last-child{border-bottom:none;}
  .post-item-title{font-weight:600;font-size:14.5px;}
  .post-item-meta{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-top:3px;}
  .status-pill{
    font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:100px;margin-left:8px;
  }
  .status-live{background:rgba(22,163,74,0.12);color:var(--accent-2);}
  .status-draft{background:rgba(91,100,114,0.12);color:var(--text-muted);}
  .item-actions button{padding:7px 12px;font-size:12.5px;margin-left:6px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--bg-dark);color:#fff;padding:12px 20px;border-radius:8px;
    font-size:13.5px;font-family:var(--font-mono);opacity:0;pointer-events:none;transition:opacity .25s ease;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <h1>ব্লগ অ্যাডমিন</h1>
    <p>পোস্ট লিখতে লগইন করুন</p>
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="loginBtn">লগইন করুন</button>
    <div class="error-text" id="loginError">ইমেইল বা পাসওয়ার্ড ভুল।</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <div class="topbar">
    <h1>Blog Admin</h1>
    <button class="logout-btn" id="logoutBtn">লগ আউট</button>
  </div>

  <div class="layout">

    <div class="panel">
      <h2 id="formHeading">নতুন পোস্ট লিখুন</h2>
      <input type="hidden" id="editingId">

      <div class="field">
        <label>টাইটেল</label>
        <input type="text" id="title" placeholder="যেমন: ৫টি ভুল যা Google Ads বাজেট নষ্ট করে">
      </div>

      <div class="row2">
        <div class="field">
          <label>স্লাগ (URL) — খালি রাখলে অটো হবে</label>
          <input type="text" id="slug" placeholder="5-google-ads-mistakes">
        </div>
        <div class="field">
          <label>ট্যাগ</label>
          <input type="text" id="tag" placeholder="Google Ads / PPC / Local SEO">
        </div>
      </div>

      <div class="field">
        <label>সংক্ষিপ্ত বিবরণ (লিস্টে দেখাবে)</label>
        <input type="text" id="excerpt" placeholder="এক লাইনে পোস্টের সারসংক্ষেপ">
      </div>

      <div class="field">
        <label>কনটেন্ট — ## হেডিং, **বোল্ড** সাপোর্ট করে</label>
        <textarea id="content" placeholder="এখানে আপনার পোস্ট লিখুন..."></textarea>
      </div>

      <div class="publish-row">
        <input type="checkbox" id="published" checked>
        <label style="margin:0;text-transform:none;letter-spacing:0;font-size:14px;color:var(--text-primary);">এখনই পাবলিশ করুন (সাইটে সাথে সাথে দেখাবে)</label>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="saveBtn" style="flex:1;">পোস্ট সেভ করুন</button>
        <button class="btn-secondary" id="clearBtn">ক্লিয়ার</button>
      </div>
    </div>

    <div class="panel">
      <h2>সব পোস্ট</h2>
      <div id="postsList"><p style="color:var(--text-muted);font-size:14px;">লোড হচ্ছে…</p></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
    orderBy, query, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ blog.html-এর মতো একই কনফিগ এখানে বসান
  const firebaseConfig = {
    apiKey: "AIzaSyDSOh_qvs_JCSub28yQEVZnp74GZ0cB_2g",
  authDomain: "ppcadsbymasud-blog-a3506.firebaseapp.com",
  projectId: "ppcadsbymasud-blog-a3506",
  storageBucket: "ppcadsbymasud-blog-a3506.firebasestorage.app",
  messagingSenderId: "595683184618",
  appId: "1:595683184618:web:0cf4bf57feedf62232ac93"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginError = document.getElementById('loginError');

  loginBtn.addEventListener('click', async ()=>{
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    try{
      await signInWithEmailAndPassword(auth, email, pass);
      loginError.style.display = 'none';
    }catch(e){
      loginError.style.display = 'block';
    }
  });

  logoutBtn.addEventListener('click', ()=> signOut(auth));

  onAuthStateChanged(auth, (user)=>{
    if(user){
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      startPostsListener();
    } else {
      loginScreen.style.display = 'flex';
      dashboard.style.display = 'none';
    }
  });

  // ---- Toast ----
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 2200);
  }

  // ---- Slug helper ----
  function slugify(str){
    return str.toLowerCase().trim()
      .replace(/[^\w\u0980-\u09FF\s-]/g,'')
      .replace(/\s+/g,'-')
      .replace(/-+/g,'-');
  }

  // ---- Form elements ----
  const titleEl = document.getElementById('title');
  const slugEl = document.getElementById('slug');
  const tagEl = document.getElementById('tag');
  const excerptEl = document.getElementById('excerpt');
  const contentEl = document.getElementById('content');
  const publishedEl = document.getElementById('published');
  const editingIdEl = document.getElementById('editingId');
  const formHeading = document.getElementById('formHeading');

  document.getElementById('clearBtn').addEventListener('click', clearForm);

  function clearForm(){
    editingIdEl.value = '';
    titleEl.value = ''; slugEl.value = ''; tagEl.value = '';
    excerptEl.value = ''; contentEl.value = ''; publishedEl.checked = true;
    formHeading.textContent = 'নতুন পোস্ট লিখুন';
  }

  document.getElementById('saveBtn').addEventListener('click', async ()=>{
    const title = titleEl.value.trim();
    if(!title){ showToast('টাইটেল দিন'); return; }

    const slug = slugEl.value.trim() ? slugify(slugEl.value) : slugify(title);
    const data = {
      title,
      slug,
      tag: tagEl.value.trim(),
      excerpt: excerptEl.value.trim(),
      content: contentEl.value,
      published: publishedEl.checked,
    };

    try{
      if(editingIdEl.value){
        await updateDoc(doc(db,'posts', editingIdEl.value), data);
        showToast('পোস্ট আপডেট হয়েছে ✅');
      } else {
        await addDoc(collection(db,'posts'), { ...data, createdAt: serverTimestamp() });
        showToast('পোস্ট পাবলিশ হয়েছে ✅');
      }
      clearForm();
    }catch(e){
      showToast('সমস্যা হয়েছে: ' + e.message);
      console.error(e);
    }
  });

  // ---- Posts list (admin sees drafts too) ----
  function startPostsListener(){
    const q = query(collection(db,'posts'), orderBy('createdAt','desc'));
    onSnapshot(q, (snap)=>{
      const listEl = document.getElementById('postsList');
      if(snap.empty){
        listEl.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">এখনো কোনো পোস্ট নেই।</p>';
        return;
      }
      listEl.innerHTML = snap.docs.map(d=>{
        const p = d.data();
        return `
          <div class="post-item">
            <div>
              <div class="post-item-title">${p.title}
                <span class="status-pill ${p.published ? 'status-live':'status-draft'}">${p.published ? 'লাইভ':'ড্রাফট'}</span>
              </div>
              <div class="post-item-meta">/${p.slug}</div>
            </div>
            <div class="item-actions">
              <button class="btn-secondary" data-edit="${d.id}">এডিট</button>
              <button class="btn-danger" data-delete="${d.id}">ডিলিট</button>
            </div>
          </div>
        `;
      }).join('');

      listEl.querySelectorAll('[data-edit]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const docSnap = snap.docs.find(d=>d.id === btn.dataset.edit);
          const p = docSnap.data();
          editingIdEl.value = docSnap.id;
          titleEl.value = p.title; slugEl.value = p.slug; tagEl.value = p.tag || '';
          excerptEl.value = p.excerpt || ''; contentEl.value = p.content || '';
          publishedEl.checked = !!p.published;
          formHeading.textContent = 'পোস্ট এডিট করুন';
          window.scrollTo({top:0, behavior:'smooth'});
        });
      });

      listEl.querySelectorAll('[data-delete]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          if(confirm('এই পোস্টটি স্থায়ীভাবে ডিলিট করবেন?')){
            await deleteDoc(doc(db,'posts', btn.dataset.delete));
            showToast('পোস্ট ডিলিট হয়েছে');
          }
        });
      });
    });
  }
</script>
</body>
</html>
