<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Md Masud Rana | Google Ads Specialist</title>
<meta name="description" content="Google Ads, PPC ও লোকাল সার্ভিস বিজনেস মার্কেটিং নিয়ে নিয়মিত লেখা।">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-dark:#0B1220;
    --bg-light:#F7F8FA;
    --surface:#FFFFFF;
    --border:#E6E9EF;
    --text-primary:#0F172A;
    --text-muted:#5B6472;
    --text-inverse:#F8FAFC;
    --accent:#2F6FED;
    --accent-2:#16A34A;
    --radius:14px;
    --font-display:'Sora',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg-light);
    color:var(--text-primary);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  /* ===== Header ===== */
  .blog-header{
    background:var(--bg-dark);
    color:var(--text-inverse);
    padding:64px 24px 56px;
    position:relative;
    overflow:hidden;
  }
  .blog-header::after{
    content:"";
    position:absolute;
    right:-120px;top:-120px;
    width:320px;height:320px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(47,111,237,0.35), transparent 70%);
  }
  .header-inner{max-width:820px;margin:0 auto;position:relative;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--font-mono);
    font-size:12.5px;letter-spacing:0.04em;
    color:#93C5FD;
    background:rgba(47,111,237,0.14);
    border:1px solid rgba(47,111,237,0.35);
    padding:6px 12px;border-radius:100px;
    margin-bottom:20px;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent-2);
    box-shadow:0 0 0 0 rgba(22,163,74,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(22,163,74,0.55);}
    70%{box-shadow:0 0 0 8px rgba(22,163,74,0);}
    100%{box-shadow:0 0 0 0 rgba(22,163,74,0);}
  }
  .blog-header h1{
    font-family:var(--font-display);
    font-size:clamp(32px,5vw,48px);
    font-weight:800;
    line-height:1.1;
    margin:0 0 14px;
  }
  .blog-header p{
    font-size:17px;
    color:#B7C1D1;
    max-width:560px;
    margin:0;
    line-height:1.6;
  }
  .back-link{
    display:inline-block;margin-bottom:28px;
    font-family:var(--font-mono);font-size:13px;
    color:#93C5FD;
  }

  /* ===== List ===== */
  .wrap{max-width:820px;margin:0 auto;padding:48px 24px 100px;}
  .post-row{
    display:grid;
    grid-template-columns:110px 1fr;
    gap:24px;
    padding:28px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .post-row:first-child{padding-top:0;}
  .post-date{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-muted);
    padding-top:4px;
  }
  .post-title{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:700;
    margin:0 0 8px;
    transition:color .15s ease;
  }
  .post-row:hover .post-title{color:var(--accent);}
  .post-excerpt{
    color:var(--text-muted);
    font-size:15px;
    line-height:1.6;
    margin:0 0 10px;
  }
  .tag-pill{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--accent);
    background:rgba(47,111,237,0.08);
    border:1px solid rgba(47,111,237,0.2);
    padding:3px 10px;
    border-radius:100px;
  }
  .empty-state, .loading-state{
    text-align:center;
    padding:80px 20px;
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:14px;
  }

  /* ===== Reader (single post) ===== */
  .reader{display:none;}
  .reader.active{display:block;}
  .list-view.hidden{display:none;}
  .reader-meta{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:14px;
  }
  .reader h1{
    font-family:var(--font-display);
    font-size:clamp(26px,4vw,38px);
    font-weight:800;
    line-height:1.2;
    margin:0 0 24px;
  }
  .reader-body{
    font-size:17px;
    line-height:1.8;
    color:#1E293B;
  }
  .reader-body p{margin:0 0 20px;}
  .reader-body h2{font-family:var(--font-display);font-size:22px;margin:36px 0 14px;}
  .reader-body h3{font-family:var(--font-display);font-size:19px;margin:28px 0 12px;}
  .reader-body img{max-width:100%;border-radius:var(--radius);margin:20px 0;}
  .reader-body a{color:var(--accent);text-decoration:underline;}
  .reader-body ul,.reader-body ol{margin:0 0 20px;padding-left:22px;}
  .reader-body code{background:#F1F3F7;padding:2px 6px;border-radius:6px;font-family:var(--font-mono);font-size:14px;}

  @media (max-width:560px){
    .post-row{grid-template-columns:1fr;gap:6px;}
    .post-date{padding-top:0;}
  }
</style>
</head>
<body>

<header class="blog-header">
  <div class="header-inner">
    <a href="/" class="back-link">← মূল সাইটে ফিরে যান</a>
    <span class="eyebrow"><span class="live-dot"></span> লাইভ আপডেট হচ্ছে</span>
    <h1>Google Ads &amp; Local Marketing নোটস</h1>
    <p>ক্যাম্পেইন অপ্টিমাইজেশন, লিড জেনারেশন আর যা কিছু শিখছি সরাসরি এখানে লিখছি — প্রতিদিন নতুন পোস্ট।</p>
  </div>
</header>

<div class="wrap">

  <div id="listView" class="list-view">
    <div id="listContainer">
      <div class="loading-state">পোস্ট লোড হচ্ছে…</div>
    </div>
  </div>

  <div id="readerView" class="reader">
    <a href="#" id="backToList" class="back-link">← সব পোস্ট</a>
    <div class="reader-meta" id="readerMeta"></div>
    <h1 id="readerTitle"></h1>
    <div class="reader-body" id="readerBody"></div>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, query, where, orderBy, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ এখানে আপনার নিজের Firebase কনফিগ বসান (setup guide দেখুন)
  const firebaseConfig = {
    apiKey: "AIzaSyDSOh_qvs_JCSub28yQEVZnp74GZ0cB_2g",
  authDomain: "ppcadsbymasud-blog-a3506.firebaseapp.com",
  projectId: "ppcadsbymasud-blog-a3506",
  storageBucket: "ppcadsbymasud-blog-a3506.firebasestorage.app",
  messagingSenderId: "595683184618",
  appId: "1:595683184618:web:0cf4bf57feedf62232ac93"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const listContainer = document.getElementById('listContainer');
  const listView = document.getElementById('listView');
  const readerView = document.getElementById('readerView');
  const readerTitle = document.getElementById('readerTitle');
  const readerMeta = document.getElementById('readerMeta');
  const readerBody = document.getElementById('readerBody');
  const backToList = document.getElementById('backToList');

  let postsCache = [];

  function fmtDate(ts){
    if(!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('bn-BD', { year:'numeric', month:'short', day:'numeric' });
  }

  // খুব সাধারণ মার্কডাউন-স্টাইল রেন্ডারার (##, **, নিউলাইন)
  function renderContent(text){
    if(!text) return '';
    let html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^### (.*$)/gim,'<h3>$1</h3>')
      .replace(/^## (.*$)/gim,'<h2>$1</h2>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/\n\n/g,'</p><p>')
      .replace(/\n/g,'<br>');
    return '<p>' + html + '</p>';
  }

  function renderList(posts){
    if(posts.length === 0){
      listContainer.innerHTML = '<div class="empty-state">এখনো কোনো পোস্ট নেই। প্রথম পোস্টটি লিখুন!</div>';
      return;
    }
    listContainer.innerHTML = posts.map(p => `
      <div class="post-row" data-slug="${p.slug}">
        <div class="post-date">${fmtDate(p.createdAt)}</div>
        <div>
          <h2 class="post-title">${p.title}</h2>
          <p class="post-excerpt">${p.excerpt || ''}</p>
          ${p.tag ? `<span class="tag-pill">${p.tag}</span>` : ''}
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.post-row').forEach(row=>{
      row.addEventListener('click', ()=> openPost(row.dataset.slug));
    });
  }

  function openPost(slug){
    const post = postsCache.find(p => p.slug === slug);
    if(!post) return;
    readerTitle.textContent = post.title;
    readerMeta.textContent = fmtDate(post.createdAt) + (post.tag ? '  ·  ' + post.tag : '');
    readerBody.innerHTML = renderContent(post.content);
    listView.classList.add('hidden');
    readerView.classList.add('active');
    window.scrollTo({top:0, behavior:'instant'});
    history.pushState({slug}, '', `?post=${slug}`);
  }

  function closeReader(){
    readerView.classList.remove('active');
    listView.classList.remove('hidden');
    history.pushState({}, '', window.location.pathname);
  }

  backToList.addEventListener('click', (e)=>{ e.preventDefault(); closeReader(); });
  window.addEventListener('popstate', ()=>{
    const slug = new URLSearchParams(window.location.search).get('post');
    if(slug) openPost(slug); else closeReader();
  });

  // 🔴 Real-time listener — নতুন পোস্ট সাথে সাথে সবার স্ক্রিনে দেখাবে
  const q = query(
    collection(db, 'posts'),
    where('published', '==', true),
    orderBy('createdAt', 'desc')
  );

  onSnapshot(q, (snapshot)=>{
    postsCache = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderList(postsCache);

    const slugInUrl = new URLSearchParams(window.location.search).get('post');
    if(slugInUrl && !readerView.classList.contains('active')){
      openPost(slugInUrl);
    }
  }, (error)=>{
    listContainer.innerHTML = '<div class="empty-state">লোড করতে সমস্যা হয়েছে। Firebase কনফিগ চেক করুন।</div>';
    console.error(error);
  });
</script>
</body>
</html>
